name: Daily Digest Email

on:
  schedule:
    # 07:15 VN = 00:15 UTC, Mon-Fri
    - cron: "15 0 * * 1-5"
    # 16:30 VN = 09:30 UTC, Mon-Fri
    - cron: "30 9 * * 1-5"
  workflow_dispatch:
    inputs:
      run:
        description: "morning | afternoon"
        required: false
        default: "morning"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Determine run type
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=${{ github.event.inputs.run }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" = "09" ]; then
              echo "run=afternoon" >> "$GITHUB_OUTPUT"
            else
              echo "run=morning" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Call Supabase digest-email
        shell: bash
        run: |
          curl -sS -X POST "${{ secrets.DIGEST_URL }}" \
            -H "x-notify-token: ${{ secrets.NOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"run\":\"${{ steps.mode.outputs.run }}\"}"
