name: Daily Digest Email

on:
  schedule:
    # TEST tối nay:
    # 20:35 VN = 13:35 UTC
    - cron: "35 13 * * 1-5"
    # 20:45 VN = 13:45 UTC
    - cron: "45 13 * * 1-5"
  workflow_dispatch:
    inputs:
      run:
        description: "morning | afternoon"
        required: false
        default: "morning"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Determine run type
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=${{ github.event.inputs.run }}" >> "$GITHUB_OUTPUT"
          else
            if [ "${{ github.event.schedule }}" = "35 13 * * 1-5" ]; then
              echo "run=morning" >> "$GITHUB_OUTPUT"
            elif [ "${{ github.event.schedule }}" = "45 13 * * 1-5" ]; then
              echo "run=afternoon" >> "$GITHUB_OUTPUT"
            else
              echo "run=morning" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Call Supabase digest-email
        shell: bash
        run: |
          curl -sS -X POST "${{ secrets.DIGEST_URL }}" \
            -H "x-notify-token: ${{ secrets.NOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"run\":\"${{ steps.mode.outputs.run }}\"}"
