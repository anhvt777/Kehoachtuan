name: Daily Digest Email

on:
  workflow_dispatch:
    inputs:
      run:
        description: "morning | afternoon"
        required: false
        default: "morning"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase digest-email
        shell: bash
        run: |
          curl -sS -X POST "${{ secrets.DIGEST_URL }}" \
            -H "x-notify-token: ${{ secrets.NOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"run\":\"${{ github.event.inputs.run }}\"}"
